run_id: starvla
run_root_dir: playground/Checkpoints
seed: 42
trackers: [jsonl, wandb]
wandb_entity: your_wandb_entity
wandb_project: llavavla
is_debug: false


framework:
  name: CosmoPredict2GR00T
  world_model:
    base_wm: ./playground/Pretrained_models/nvidia/Cosmos-Predict2-2B-Video2World
    extract_layers: [-1]
  action_model:
    action_dim: 25
    state_dim: 22
    future_action_window_size: 49
    action_horizon: 50

datasets:

  vla_data:
    dataset_py: lerobot_datasets
    data_root_dir: /mnt/pfs/dengyiqi/datasets/UMI_demo_data/
    data_mix: x2w_wm_dataset # washing machine/world model
    include_state: true
    excluded_segment_statuses: # 是用排除还是包含更好？
      - Start remote operation.
      - End remote operation.
    action_type: delta_qpos
    sequential_step_sampling: False
    CoT_prompt: "Your task is {instruction}. To identify the key objects for your task. Locate their bounding boxes in [x1,y1,x2,y2] format."
    CoT_answer: bbox
    default_image_resolution: [3, 224, 224]
    per_device_batch_size: 16
    load_all_data_for_training: true
    obs: ["image_0"]
    video_backend: torchvision_av


trainer:
  epochs: 100
  max_train_steps: 100000
  num_warmup_steps: 5000
  save_interval: 5000
  eval_interval: 100
  learning_rate:
    base: 2.5e-05
    qwen_vl_interface: 1.0e-05
    action_model: 1.0e-04
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-06
  freeze_modules: 'qwen_vl_interface'
  loss_scale:
    vla: 1.0
    vlm: 0.1
  max_grad_norm: 1.0
  warmup_ratio: 0.1
  weight_decay: 0.0
  logging_frequency: 10
  gradient_clipping: 1.0
  gradient_accumulation_steps: 4
  gradient_checkpointing: true

  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08

  # parameters to be determined
  is_resume: false
  resume_epoch: null
  resume_step: null
  enable_gradient_checkpointing: true
  enable_mixed_precision_training: true
